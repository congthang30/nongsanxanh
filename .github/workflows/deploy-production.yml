name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Lý do deploy thủ công'
        required: false
        default: 'Manual trigger'

# Chỉ cho phép 1 deployment chạy đồng thời; deploy mới sẽ chờ deploy cũ xong
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nongsanxanh-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nongsanxanh-frontend

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: verify — re-run full test + build (gate)
  # ─────────────────────────────────────────────────────────
  verify:
    name: Verify (test · build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Backend — install
        working-directory: backend
        run: npm ci

      - name: Backend — prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Backend — type-check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Backend — test
        working-directory: backend
        run: npm test -- --passWithNoTests --forceExit

      - name: Backend — build
        working-directory: backend
        run: npm run build

      # ── Frontend ─────────────────────────────────────────
      - name: Setup Node 20 (frontend cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install
        working-directory: frontend
        run: npm ci

      - name: Frontend — build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1

  # ─────────────────────────────────────────────────────────
  # Job 2: build-and-push — build Docker images → GHCR
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract short SHA
        id: meta
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── Build & Push backend ──────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,scope=backend-prod,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # ── Build & Push frontend ─────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_BASE_URL=/api/v1
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,scope=frontend-prod,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ─────────────────────────────────────────────────────────
  # Job 3: deploy — SSH vào VPS, pull + up
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Kết nối VPN qua Tailscale ────────────────────────
      - name: Connect Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --accept-routes

      # ── Chuẩn bị SSH key ─────────────────────────────────
      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── Tạo file .env production ─────────────────────────
      - name: Write production .env
        run: |
          cat > /tmp/prod.env << 'EOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          VNPAY_TMN_CODE=${{ secrets.VNPAY_TMN_CODE }}
          VNPAY_HASH_SECRET=${{ secrets.VNPAY_HASH_SECRET }}
          BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
          IMAGE_TAG=${{ github.sha }}
          EOF

      # ── Rsync compose file + .env lên VPS ────────────────
      - name: Rsync files to VPS
        run: |
          rsync -avz --no-perms \
            -e "ssh -p ${{ secrets.VPS_PORT }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            docker-compose.production.yml \
            /tmp/prod.env \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/

      # ── Pull images + bring up ────────────────────────────
      - name: Deploy on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT }} \
              -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
              "bash -s" << 'ENDSSH'
            set -euo pipefail
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Áp dụng env từ file vừa rsync
            cp prod.env .env

            # Đăng nhập GHCR trên VPS
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            # Pull images mới và khởi động
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans

            # Dọn images cũ không còn dùng
            docker image prune -f
          ENDSSH

      # ── Health check sau deploy ───────────────────────────
      - name: Wait for backend healthy
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 18); do
            STATUS=$(ssh -p ${{ secrets.VPS_PORT }} \
                         -i ~/.ssh/id_rsa \
                         -o StrictHostKeyChecking=no \
                         ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} \
                         "docker inspect --format='{{.State.Health.Status}}' \$(docker compose -f ${{ secrets.VPS_DEPLOY_PATH }}/docker-compose.production.yml ps -q backend) 2>/dev/null || echo unknown")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Backend did not become healthy within 3 minutes"
          exit 1

      - name: HTTP health check /api/v1/health
        run: |
          curl --fail --retry 3 --retry-delay 5 --max-time 10 \
            "http://${{ secrets.VPS_HOST }}:3000/api/v1/health" \
          && echo "✅ Health endpoint OK" \
          || echo "⚠️  Health endpoint not available (non-blocking)" || true
