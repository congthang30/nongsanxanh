name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Job 1: Backend — type-check + test + build
  # ─────────────────────────────────────────
  backend:
    name: Backend (type-check · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────
  # Job 2: Frontend — build (tsc -b + vite)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (type-check · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b && vite build)
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1

  # ─────────────────────────────────────────
  # Job 3: Docker smoke — build only, no push
  # ─────────────────────────────────────────
  docker-smoke:
    name: Docker smoke (build only)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: agri-backend:smoke
          cache-from: type=gha,scope=backend-smoke
          cache-to: type=gha,scope=backend-smoke,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: agri-frontend:smoke
          build-args: VITE_API_BASE_URL=/api/v1
          cache-from: type=gha,scope=frontend-smoke
          cache-to: type=gha,scope=frontend-smoke,mode=max

      - name: Build AI service image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: false
          tags: agri-ai:smoke
          build-args: INSTALL_LOCAL_MODEL=false
          cache-from: type=gha,scope=ai-smoke
          cache-to: type=gha,scope=ai-smoke,mode=max
