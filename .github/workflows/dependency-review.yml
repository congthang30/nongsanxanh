name: Dependency Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail nếu có dependency severity critical hoặc high
          fail-on-severity: critical
          # Cho phép licenses phổ biến (MIT, Apache, BSD, ISC)
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
          # Hiện comment tóm tắt lên PR
          comment-summary-in-pr: always
          # Báo cáo cả vulnerabilities và license issues
          warn-only: false
