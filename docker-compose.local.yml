services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agri
      POSTGRES_PASSWORD: agri_pass
      POSTGRES_DB: agri_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri -d agri_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata_local:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: ./ai-service
      args:
        INSTALL_LOCAL_MODEL: "true"
    restart: unless-stopped
    environment:
      AI_EMBEDDING_PROVIDER: local
      AI_LOCAL_EMBEDDING_MODEL: ${AI_LOCAL_EMBEDDING_MODEL:-jinaai/jina-embeddings-v3}
      AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1024}
      AI_GENERATION_PROVIDER: ${AI_GENERATION_PROVIDER:-none}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HF_HOME: /root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-seed:
    build:
      context: ./backend
      target: builder
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://agri:agri_pass@db:5432/agri_db?schema=public
      AI_SERVICE_URL: http://ai-service:8000
      AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1024}
      SEED_EMBED_WAIT_MS: ${SEED_EMBED_WAIT_MS:-180000}
      SEED_EMBED_TIMEOUT_MS: ${SEED_EMBED_TIMEOUT_MS:-180000}
    volumes:
      - ./backend/prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    restart: "no"

  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    depends_on:
      db-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://agri:agri_pass@db:5432/agri_db?schema=public
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1024}
      AI_AUTO_REINDEX_ON_EMPTY: ${AI_AUTO_REINDEX_ON_EMPTY:-true}
      CHAT_MEMORY_TTL_SECONDS: ${CHAT_MEMORY_TTL_SECONDS:-604800}
      CHAT_MEMORY_MAX_MESSAGES: ${CHAT_MEMORY_MAX_MESSAGES:-100}
      VECTOR_SEARCH_TOP_K: ${VECTOR_SEARCH_TOP_K:-5}
      VECTOR_SCORE_THRESHOLD: ${VECTOR_SCORE_THRESHOLD:-0.62}
      AI_VECTOR_SYNC_DEBOUNCE_MS: ${AI_VECTOR_SYNC_DEBOUNCE_MS:-10000}
      AI_VECTOR_SYNC_ATTEMPTS: ${AI_VECTOR_SYNC_ATTEMPTS:-3}
      AI_VECTOR_SYNC_CONCURRENCY: ${AI_VECTOR_SYNC_CONCURRENCY:-2}
      AI_VECTOR_SYNC_REMOVE_ON_COMPLETE: ${AI_VECTOR_SYNC_REMOVE_ON_COMPLETE:-1000}
      AI_VECTOR_SYNC_REMOVE_ON_FAIL: ${AI_VECTOR_SYNC_REMOVE_ON_FAIL:-5000}
      AI_VECTOR_EXPIRY_SCAN_INTERVAL_MS: ${AI_VECTOR_EXPIRY_SCAN_INTERVAL_MS:-900000}
      PORT: "3000"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-nongsanxanh}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: "${SMTP_FROM:-Nông Sản Xanh <no-reply@agri.local>}"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5173}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:3000/api/v1/payments/vnpay/return}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata_local:
  redisdata_local:
  huggingface_cache:
  backend_node_modules:
  frontend_node_modules:
