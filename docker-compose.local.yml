services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agri
      POSTGRES_PASSWORD: agri_pass
      POSTGRES_DB: agri_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri -d agri_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata_local:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata_local:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-agri-media}
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set download local/$$S3_BUCKET"
    restart: "no"

  ai-service:
    build:
      context: ./ai-service
      args:
        INSTALL_LOCAL_MODEL: "true"
    restart: unless-stopped
    environment:
      AI_EMBEDDING_PROVIDER: local
      AI_LOCAL_EMBEDDING_MODEL: ${AI_LOCAL_EMBEDDING_MODEL:-jinaai/jina-embeddings-v3}
      AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1024}
      AI_GENERATION_PROVIDER: ${AI_GENERATION_PROVIDER:-none}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HF_HOME: /root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-seed:
    build:
      context: ./backend
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://agri:agri_pass@db:5432/agri_db?schema=public
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    restart: "no"

  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    depends_on:
      db-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://agri:agri_pass@db:5432/agri_db?schema=public
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-1024}
      CHAT_MEMORY_TTL_SECONDS: ${CHAT_MEMORY_TTL_SECONDS:-604800}
      CHAT_MEMORY_MAX_MESSAGES: ${CHAT_MEMORY_MAX_MESSAGES:-100}
      VECTOR_SEARCH_TOP_K: ${VECTOR_SEARCH_TOP_K:-5}
      VECTOR_SCORE_THRESHOLD: ${VECTOR_SCORE_THRESHOLD:-0.62}
      AI_VECTOR_SYNC_DEBOUNCE_MS: ${AI_VECTOR_SYNC_DEBOUNCE_MS:-10000}
      AI_VECTOR_SYNC_ATTEMPTS: ${AI_VECTOR_SYNC_ATTEMPTS:-3}
      AI_VECTOR_SYNC_CONCURRENCY: ${AI_VECTOR_SYNC_CONCURRENCY:-2}
      AI_VECTOR_SYNC_REMOVE_ON_COMPLETE: ${AI_VECTOR_SYNC_REMOVE_ON_COMPLETE:-1000}
      AI_VECTOR_SYNC_REMOVE_ON_FAIL: ${AI_VECTOR_SYNC_REMOVE_ON_FAIL:-5000}
      AI_VECTOR_EXPIRY_SCAN_INTERVAL_MS: ${AI_VECTOR_EXPIRY_SCAN_INTERVAL_MS:-900000}
      PORT: "3000"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/agri-media}
      S3_BUCKET: ${S3_BUCKET:-agri-media}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: "${SMTP_FROM:-Nông Sản Xanh <no-reply@agri.local>}"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5173}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata_local:
  redisdata_local:
  miniodata_local:
  huggingface_cache:
  backend_node_modules:
  frontend_node_modules:
