services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agri_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agri
      POSTGRES_PASSWORD: agri_pass
      POSTGRES_DB: agri_db
    ports:
      - "5433:5432"
    volumes:
      - agri_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri -d agri_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agri_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - agri_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agri_pg_data:
  agri_redis_data:
